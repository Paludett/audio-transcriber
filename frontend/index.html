<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Local Transcriber</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #0f1115;
    --panel: #1a1d24;
    --border: #2c313c;
    --text: #e8e9ec;
    --muted: #9aa0ab;
    --accent: #4f8cff;
    --accent-hover: #3d76e0;
    --error: #ff5f5f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }
  main { width: 100%; max-width: 720px; }
  h1 { font-size: 1.4rem; margin-bottom: 4px; }
  p.subtitle { color: var(--muted); margin-top: 0; margin-bottom: 24px; }

  #dropzone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    background: var(--panel);
  }
  #dropzone.dragover {
    border-color: var(--accent);
    background: #16223b;
  }
  #dropzone p { margin: 8px 0; color: var(--muted); }
  #dropzone strong { color: var(--text); }
  #fileInput { display: none; }

  #fileInfo { margin-top: 12px; color: var(--muted); font-size: 0.9rem; min-height: 1.2em; }

  .row { display: flex; align-items: center; gap: 12px; margin-top: 16px; }
  select, button {
    font-family: inherit;
    font-size: 0.95rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    padding: 8px 14px;
    cursor: pointer;
  }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.primary:hover { background: var(--accent-hover); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  #status { margin-top: 16px; display: none; align-items: center; gap: 10px; color: var(--muted); }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #error {
    display: none;
    margin-top: 16px;
    padding: 12px 14px;
    border-radius: 8px;
    background: #3a1a1a;
    border: 1px solid var(--error);
    color: #ffb3b3;
    font-size: 0.9rem;
  }

  #resultPanel { display: none; margin-top: 24px; }
  #meta { color: var(--muted); font-size: 0.85rem; margin-bottom: 8px; }
  textarea#resultText {
    width: 100%;
    min-height: 260px;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    font-size: 0.95rem;
    line-height: 1.5;
    resize: vertical;
    font-family: inherit;
  }
  .actions { display: flex; gap: 10px; margin-top: 12px; }
  #copyFeedback { color: var(--accent); font-size: 0.85rem; margin-left: 4px; opacity: 0; transition: opacity .2s; }
</style>
</head>
<body>
<main>
  <h1>Local Transcriber</h1>
  <p class="subtitle">Drag an audio file (.opus, .ogg, .m4a, .mp3, .wav) or click to select one.</p>

  <div id="dropzone">
    <p><strong>Drop the file here</strong></p>
    <p>or click to choose</p>
    <input type="file" id="fileInput" accept=".opus,.ogg,.m4a,.mp3,.wav">
  </div>
  <div id="fileInfo"></div>

  <div class="row">
    <label for="language">Language:</label>
    <select id="language">
      <option value="en" selected>English</option>
      <option value="pt">Portuguese</option>
      <option value="es">Spanish</option>
      <option value="">Detect automatically</option>
    </select>
    <button class="primary" id="transcribeBtn" disabled>Transcribe</button>
  </div>

  <div id="status">
    <div class="spinner"></div>
    <span>Transcribing... this may take a few seconds</span>
  </div>

  <div id="error"></div>

  <div id="resultPanel">
    <div id="meta"></div>
    <textarea id="resultText" spellcheck="false"></textarea>
    <div class="actions">
      <button id="copyBtn">Copy</button>
      <button id="exportBtn">Export .txt</button>
      <span id="copyFeedback">Copied!</span>
    </div>
  </div>
</main>

<script>
const API_URL = "http://localhost:8000/transcribe";

const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("fileInput");
const fileInfo = document.getElementById("fileInfo");
const languageSelect = document.getElementById("language");
const transcribeBtn = document.getElementById("transcribeBtn");
const statusEl = document.getElementById("status");
const errorEl = document.getElementById("error");
const resultPanel = document.getElementById("resultPanel");
const metaEl = document.getElementById("meta");
const resultText = document.getElementById("resultText");
const copyBtn = document.getElementById("copyBtn");
const exportBtn = document.getElementById("exportBtn");
const copyFeedback = document.getElementById("copyFeedback");

let selectedFile = null;

dropzone.addEventListener("click", () => fileInput.click());

dropzone.addEventListener("dragover", (e) => {
  e.preventDefault();
  dropzone.classList.add("dragover");
});
dropzone.addEventListener("dragleave", () => dropzone.classList.remove("dragover"));
dropzone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropzone.classList.remove("dragover");
  if (e.dataTransfer.files.length) {
    setFile(e.dataTransfer.files[0]);
  }
});

fileInput.addEventListener("change", () => {
  if (fileInput.files.length) setFile(fileInput.files[0]);
});

function setFile(file) {
  selectedFile = file;
  fileInfo.textContent = `${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
  transcribeBtn.disabled = false;
  hideError();
}

function showError(msg) {
  errorEl.textContent = msg;
  errorEl.style.display = "block";
}
function hideError() {
  errorEl.style.display = "none";
}

transcribeBtn.addEventListener("click", async () => {
  if (!selectedFile) return;

  hideError();
  resultPanel.style.display = "none";
  statusEl.style.display = "flex";
  transcribeBtn.disabled = true;

  const formData = new FormData();
  formData.append("file", selectedFile);
  if (languageSelect.value) formData.append("language", languageSelect.value);

  try {
    const resp = await fetch(API_URL, { method: "POST", body: formData });
    const data = await resp.json();

    if (!resp.ok) {
      throw new Error(data.detail || `Error ${resp.status}`);
    }

    resultText.value = data.text;
    metaEl.textContent =
      `Duration: ${data.duration_seconds.toFixed(1)}s · ` +
      `Processed in: ${data.processing_time_seconds.toFixed(1)}s · ` +
      `${data.segments.length} segment(s)`;
    resultPanel.style.display = "block";
  } catch (err) {
    showError(err.message || "Failed to transcribe. Check whether the backend is running.");
  } finally {
    statusEl.style.display = "none";
    transcribeBtn.disabled = false;
  }
});

copyBtn.addEventListener("click", async () => {
  await navigator.clipboard.writeText(resultText.value);
  copyFeedback.style.opacity = "1";
  setTimeout(() => (copyFeedback.style.opacity = "0"), 1200);
});

exportBtn.addEventListener("click", () => {
  const blob = new Blob([resultText.value], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const base = selectedFile ? selectedFile.name.replace(/\.[^.]+$/, "") : "transcription";
  a.href = url;
  a.download = `${base}.txt`;
  a.click();
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>

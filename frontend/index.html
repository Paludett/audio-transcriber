<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Local Transcriber</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #0f1115;
    --panel: #1a1d24;
    --border: #2c313c;
    --text: #e8e9ec;
    --muted: #9aa0ab;
    --accent: #4f8cff;
    --accent-hover: #3d76e0;
    --error: #ff5f5f;
    --success: #4caf82;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }
  main { width: 100%; max-width: 720px; }
  h1 { font-size: 1.4rem; margin-bottom: 4px; }
  p.subtitle { color: var(--muted); margin-top: 0; margin-bottom: 24px; }

  #tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  #tabs button {
    flex: 1;
    background: transparent;
    border: 1px solid var(--border);
  }
  #tabs button.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  #youtubePanel input {
    width: 100%;
    font-family: inherit;
    font-size: 0.95rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    padding: 12px 14px;
  }

  #dropzone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    background: var(--panel);
  }
  #dropzone.dragover {
    border-color: var(--accent);
    background: #16223b;
  }
  #dropzone p { margin: 8px 0; color: var(--muted); }
  #dropzone strong { color: var(--text); }
  #fileInput { display: none; }

  #fileInfo { margin-top: 12px; color: var(--muted); font-size: 0.9rem; min-height: 1.2em; }

  .row { display: flex; align-items: center; gap: 12px; margin-top: 16px; }
  select, button {
    font-family: inherit;
    font-size: 0.95rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    padding: 8px 14px;
    cursor: pointer;
  }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.primary:hover { background: var(--accent-hover); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  #error {
    display: none;
    margin-top: 16px;
    padding: 12px 14px;
    border-radius: 8px;
    background: #3a1a1a;
    border: 1px solid var(--error);
    color: #ffb3b3;
    font-size: 0.9rem;
  }

  #queueEmpty { color: var(--muted); font-size: 0.9rem; padding: 20px 0; text-align: center; }

  .job-card {
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--panel);
    margin-bottom: 10px;
    overflow: hidden;
  }
  .job-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    cursor: pointer;
    gap: 10px;
  }
  .job-card-name {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .job-card-type { color: var(--muted); font-size: 0.8rem; margin-right: 8px; }
  .job-badge {
    font-size: 0.75rem;
    padding: 2px 8px;
    border-radius: 99px;
    border: 1px solid var(--border);
    color: var(--muted);
    flex-shrink: 0;
    white-space: nowrap;
  }
  .job-badge.processing { color: var(--accent); border-color: var(--accent); }
  .job-badge.done { color: var(--success); border-color: var(--success); }
  .job-badge.error { color: var(--error); border-color: var(--error); }
  .job-card-detail { display: none; border-top: 1px solid var(--border); padding: 14px; }
  .job-card.expanded .job-card-detail { display: block; }
  .job-card-error-msg { color: #ffb3b3; font-size: 0.9rem; }

  #meta, .job-meta { color: var(--muted); font-size: 0.85rem; margin-bottom: 8px; }
  textarea.transcript-box {
    width: 100%;
    min-height: 220px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    font-size: 0.95rem;
    line-height: 1.5;
    resize: vertical;
    font-family: inherit;
  }
  .actions { display: flex; gap: 10px; margin-top: 12px; }
  .copy-feedback { color: var(--accent); font-size: 0.85rem; margin-left: 4px; opacity: 0; transition: opacity .2s; }
</style>
</head>
<body>
<main>
  <h1>Local Transcriber</h1>
  <p class="subtitle">Drag audio files (.opus, .ogg, .m4a, .mp3, .wav) or paste a YouTube link. Everything you add goes into the queue.</p>

  <div id="tabs">
    <button id="tabFile" class="active">Audio file</button>
    <button id="tabYoutube">YouTube link</button>
    <button id="tabQueue">Queue</button>
  </div>

  <div id="filePanel">
    <div id="dropzone">
      <p><strong>Drop files here</strong></p>
      <p>or click to choose (you can select multiple)</p>
      <input type="file" id="fileInput" accept=".opus,.ogg,.m4a,.mp3,.wav" multiple>
    </div>
    <div id="fileInfo"></div>
  </div>

  <div id="youtubePanel" style="display: none;">
    <input type="url" id="youtubeUrl" placeholder="https://www.youtube.com/watch?v=...">
  </div>

  <div id="queuePanel" style="display: none;">
    <div id="queueEmpty">No jobs yet — add a file or a YouTube link and it will appear here.</div>
    <div id="queueList"></div>
    <div class="row" id="queueActions" style="display: none;">
      <button id="clearFinishedBtn">Clear finished</button>
    </div>
  </div>

  <div class="row" id="submitRow">
    <label for="language">Language:</label>
    <select id="language">
      <option value="en" selected>English</option>
      <option value="pt">Portuguese</option>
      <option value="es">Spanish</option>
      <option value="">Detect automatically</option>
    </select>
    <button class="primary" id="transcribeBtn" disabled>Add to Queue</button>
  </div>

  <div id="error"></div>
</main>

<script>
const API_BASE = "http://localhost:8000";
const FILE_JOBS_URL = `${API_BASE}/jobs/files`;
const YOUTUBE_JOBS_URL = `${API_BASE}/jobs/youtube`;
const JOBS_URL = `${API_BASE}/jobs`;

const tabFile = document.getElementById("tabFile");
const tabYoutube = document.getElementById("tabYoutube");
const tabQueue = document.getElementById("tabQueue");
const filePanel = document.getElementById("filePanel");
const youtubePanel = document.getElementById("youtubePanel");
const queuePanel = document.getElementById("queuePanel");
const youtubeUrlInput = document.getElementById("youtubeUrl");
const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("fileInput");
const fileInfo = document.getElementById("fileInfo");
const languageSelect = document.getElementById("language");
const submitRow = document.getElementById("submitRow");
const transcribeBtn = document.getElementById("transcribeBtn");
const errorEl = document.getElementById("error");
const queueEmpty = document.getElementById("queueEmpty");
const queueList = document.getElementById("queueList");
const queueActions = document.getElementById("queueActions");
const clearFinishedBtn = document.getElementById("clearFinishedBtn");

let selectedFiles = [];
let mode = "file";
let pollHandle = null;
const expandedJobIds = new Set();
const jobDetailCache = new Map();

function setMode(next) {
  mode = next;
  tabFile.classList.toggle("active", mode === "file");
  tabYoutube.classList.toggle("active", mode === "youtube");
  tabQueue.classList.toggle("active", mode === "queue");
  filePanel.style.display = mode === "file" ? "block" : "none";
  youtubePanel.style.display = mode === "youtube" ? "block" : "none";
  queuePanel.style.display = mode === "queue" ? "block" : "none";
  submitRow.style.display = mode === "queue" ? "none" : "flex";
  if (mode === "file") transcribeBtn.disabled = selectedFiles.length === 0;
  if (mode === "youtube") transcribeBtn.disabled = !youtubeUrlInput.value.trim();
  hideError();
  if (mode === "queue") ensurePolling();
}

tabFile.addEventListener("click", () => setMode("file"));
tabYoutube.addEventListener("click", () => setMode("youtube"));
tabQueue.addEventListener("click", () => setMode("queue"));
youtubeUrlInput.addEventListener("input", () => {
  transcribeBtn.disabled = !youtubeUrlInput.value.trim();
});

dropzone.addEventListener("click", () => fileInput.click());

dropzone.addEventListener("dragover", (e) => {
  e.preventDefault();
  dropzone.classList.add("dragover");
});
dropzone.addEventListener("dragleave", () => dropzone.classList.remove("dragover"));
dropzone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropzone.classList.remove("dragover");
  if (e.dataTransfer.files.length) setFiles(e.dataTransfer.files);
});

fileInput.addEventListener("change", () => {
  if (fileInput.files.length) setFiles(fileInput.files);
});

function setFiles(fileList) {
  selectedFiles = Array.from(fileList);
  fileInfo.textContent = selectedFiles.length === 1
    ? `${selectedFiles[0].name} (${(selectedFiles[0].size / 1024 / 1024).toFixed(2)} MB)`
    : `${selectedFiles.length} files: ${selectedFiles.map((f) => f.name).join(", ")}`;
  transcribeBtn.disabled = false;
  hideError();
}

function showError(msg) {
  errorEl.textContent = msg;
  errorEl.style.display = "block";
}
function hideError() {
  errorEl.style.display = "none";
}

transcribeBtn.addEventListener("click", async () => {
  if (mode === "file" && selectedFiles.length === 0) return;
  if (mode === "youtube" && !youtubeUrlInput.value.trim()) return;

  hideError();
  transcribeBtn.disabled = true;

  try {
    if (mode === "file") {
      const formData = new FormData();
      for (const file of selectedFiles) formData.append("files", file);
      if (languageSelect.value) formData.append("language", languageSelect.value);
      const resp = await fetch(FILE_JOBS_URL, { method: "POST", body: formData });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.detail || `Error ${resp.status}`);
      selectedFiles = [];
      fileInfo.textContent = "";
      fileInput.value = "";
    } else {
      const resp = await fetch(YOUTUBE_JOBS_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ urls: [youtubeUrlInput.value.trim()], language: languageSelect.value || null }),
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.detail || `Error ${resp.status}`);
      youtubeUrlInput.value = "";
    }

    setMode("queue");
    refreshJobs();
  } catch (err) {
    showError(err.message || "Failed to reach the backend.");
  } finally {
    transcribeBtn.disabled = (mode === "file" ? selectedFiles.length === 0 : !youtubeUrlInput.value.trim());
  }
});

function ensurePolling() {
  if (pollHandle) return;
  refreshJobs();
  pollHandle = setInterval(refreshJobs, 2000);
}

function stopPolling() {
  if (pollHandle) {
    clearInterval(pollHandle);
    pollHandle = null;
  }
}

async function refreshJobs() {
  let list;
  try {
    const resp = await fetch(JOBS_URL);
    list = await resp.json();
  } catch (err) {
    return;
  }

  renderQueue(list);

  const hasActive = list.some((j) => j.status === "queued" || j.status === "processing");
  if (!hasActive) stopPolling();

  for (const job of list) {
    if (expandedJobIds.has(job.id) && job.status === "done" && !jobDetailCache.has(job.id)) {
      loadJobDetail(job.id);
    }
  }
}

function statusLabel(status) {
  return { queued: "Queued", processing: "Processing…", done: "Done", error: "Error" }[status] || status;
}

function renderJobCardHtml(job) {
  const expanded = expandedJobIds.has(job.id);
  const typeLabel = job.type === "youtube" ? "YouTube" : "File";
  let detailHtml = "";
  if (expanded) {
    if (job.status === "done") {
      const detail = jobDetailCache.get(job.id);
      detailHtml = detail ? renderJobDetailHtml(job, detail) : "<p>Loading…</p>";
    } else if (job.status === "error") {
      detailHtml = `<p class="job-card-error-msg">${escapeHtml(job.error || "Unknown error.")}</p>`;
    } else {
      detailHtml = "<p>Waiting for transcription to finish…</p>";
    }
  }

  return `
    <div class="job-card ${expanded ? "expanded" : ""}" data-job-id="${job.id}">
      <div class="job-card-header" data-role="toggle" data-job-id="${job.id}">
        <span class="job-card-type">${typeLabel}</span>
        <span class="job-card-name" title="${escapeHtml(job.name)}">${escapeHtml(job.name)}</span>
        <span class="job-badge ${job.status}">${statusLabel(job.status)}</span>
      </div>
      <div class="job-card-detail">${detailHtml}</div>
    </div>
  `;
}

function renderJobDetailHtml(job, detail) {
  const result = detail.result;
  const parts = [`Duration: ${result.duration_seconds.toFixed(1)}s`, `Processed in: ${result.processing_time_seconds.toFixed(1)}s`, `${result.segments.length} segment(s)`];
  if (result.video_title) parts.unshift(result.video_title);
  if (result.source) parts.push(`Source: ${result.source === "captions" ? "YouTube captions" : "Whisper"}`);

  return `
    <div class="job-meta">${escapeHtml(parts.join(" · "))}</div>
    <textarea class="transcript-box" data-job-id="${job.id}" spellcheck="false" readonly>${escapeHtml(result.text)}</textarea>
    <div class="actions">
      <button data-role="copy" data-job-id="${job.id}">Copy</button>
      <button data-role="export" data-job-id="${job.id}">Export .txt</button>
      <span class="copy-feedback" data-role="copy-feedback" data-job-id="${job.id}">Copied!</span>
    </div>
  `;
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str == null ? "" : String(str);
  return div.innerHTML;
}

function renderQueue(list) {
  queueEmpty.style.display = list.length === 0 ? "block" : "none";
  queueActions.style.display = list.length === 0 ? "none" : "flex";
  const sorted = [...list].sort((a, b) => b.created_at - a.created_at);
  queueList.innerHTML = sorted.map(renderJobCardHtml).join("");
}

async function loadJobDetail(jobId) {
  try {
    const resp = await fetch(`${JOBS_URL}/${jobId}`);
    if (!resp.ok) return;
    const detail = await resp.json();
    jobDetailCache.set(jobId, detail);
    refreshQueueFromCache();
  } catch (err) {
    // ignore, will retry on next poll tick
  }
}

function refreshQueueFromCache() {
  // Re-render using the last known summaries plus whatever is now cached.
  fetch(JOBS_URL).then((r) => r.json()).then(renderQueue).catch(() => {});
}

queueList.addEventListener("click", (e) => {
  const toggleEl = e.target.closest('[data-role="toggle"]');
  const copyEl = e.target.closest('[data-role="copy"]');
  const exportEl = e.target.closest('[data-role="export"]');

  if (copyEl) {
    const detail = jobDetailCache.get(copyEl.dataset.jobId);
    if (detail) {
      navigator.clipboard.writeText(detail.result.text);
      const feedback = queueList.querySelector(`[data-role="copy-feedback"][data-job-id="${copyEl.dataset.jobId}"]`);
      if (feedback) {
        feedback.style.opacity = "1";
        setTimeout(() => (feedback.style.opacity = "0"), 1200);
      }
    }
    return;
  }

  if (exportEl) {
    const detail = jobDetailCache.get(exportEl.dataset.jobId);
    if (detail) {
      const blob = new Blob([detail.result.text], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${(detail.name || "transcription").replace(/\.[^.]+$/, "")}.txt`;
      a.click();
      URL.revokeObjectURL(url);
    }
    return;
  }

  if (toggleEl) {
    const jobId = toggleEl.dataset.jobId;
    if (expandedJobIds.has(jobId)) {
      expandedJobIds.delete(jobId);
      refreshQueueFromCache();
    } else {
      expandedJobIds.add(jobId);
      refreshQueueFromCache();
      loadJobDetail(jobId);
    }
  }
});

clearFinishedBtn.addEventListener("click", async () => {
  await fetch(JOBS_URL + "/finished", { method: "DELETE" });
  refreshJobs();
});
</script>
</body>
</html>
